<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Final</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .video-container {
            width: 90%;
            max-width: 500px;
            background: #111;
            border-radius: 15px;
            border: 2px solid #333;
            overflow: hidden;
        }
        video { width: 100%; display: block; }
        #wishes-area {
            margin: 20px 0;
            min-height: 60px;
            text-align: center;
        }
        .wish-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
            display: none;
            padding: 0 10px;
        }
        #surprise-btn {
            background: #ffd700;
            color: #000;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }
        .emoji {
            position: fixed;
            top: -100px;
            font-size: 2rem;
            z-index: 999;
            pointer-events: none;
            animation: fall 3s linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="v" playsinline muted loop>
            <source src="Sh.mp4" type="video/mp4">
        </video>
    </div>

    <div id="wishes-area">
        <div id="t" class="wish-text">✨ HAVE A MAGICAL DAY! ✨</div>
    </div>

    <button id="surprise-btn" onclick="go()">TAP FOR SURPRISE</button>

    <script>
        function go() {
            const btn = document.getElementById('surprise-btn');
            const video = document.getElementById('v');
            const text = document.getElementById('t');

            // Start Video and Text
            video.play();
            text.style.display = "block";
            btn.style.display = "none"; // Hide button after click

            // Emoji Rain
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const e = document.createElement('div');
                    e.className = 'emoji';
                    const list = ['🔥','✨','🎉','🎁','❤️','⭐','🎈'];
                    e.innerHTML = list[Math.floor(Math.random() * list.length)];
                    e.style.left = Math.random() * 100 + "vw";
                    e.style.animationDuration = (Math.random() * 2 + 1) + "s";
                    document.body.appendChild(e);
                    setTimeout(() => e.remove(), 3000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
